<div class="page-wrapper">
  <div class="content">
    <div class="container">
      <div class="row justify-content-center align-items-center">
        @for (category of categories; track category.id) {
        <div class="col-lg-3 col-md-6" (click)="goToSearch()">
          <div class="category card wow fadeInUp" data-wow-delay="0.3s">
            <div class="card-body">
              <div
                class="feature-icon d-flex justify-content-center align-items-center mb-2"
              >
                <span
                  class="rounded-pill d-flex justify-content-center align-items-center p-3"
                >
                  <img [src]="category.logo" class="img-fluid" alt="logo" />
                </span>
              </div>
              <h5 class="text-center">{{ category.name }}</h5>
              <div class="overlay">
                <img [src]="category.img" class="img-fluid" alt="img" />
              </div>
            </div>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</div>
