<div class="authentication-header">
	<div class="container">
		<div class="col-md-12">
			<div class="text-center">
				<img src="assets/logo/logo.svg" alt="logo" class="h-50 w-25">
			</div>
		</div>
	</div>
</div>	

<div class="main-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 mx-auto">
        <form>
          <div class="d-flex flex-column justify-content-center">
            <div class="card p-sm-4 my-5">
              <div class="card-body">
                <div class="text-center mb-3">
                  <h3 class="mb-2">Bienvenue</h3>
                  <p>Entrez vos identifiants pour accéder à votre compte</p>
                </div>
                <div class="mb-3">
                  <label class="form-label">Nom d'utilisateur</label>
                  <input type="text" class="form-control" />
                </div>
                <div class="mb-3">
                  <div
                    class="d-flex align-items-center justify-content-between flex-wrap"
                  >
                    <label class="form-label">Mot de passe</label>
                    <a
                      [routerLink]="routes.forgotPassword"
                      class="text-primary fw-medium text-decoration-underline mb-1 fs-14"
                      >Mot de passe oublié ?</a
                    >
                  </div>
                  <input type="password" class="form-control" />
                </div>

                <div class="mb-3">
                  <button
                    type="button"
                    class="btn btn-lg btn-linear-primary w-100"
                    (click)="navigate()"
                  >
                    Se connecter
                  </button>
                </div>
                <div class="d-flex justify-content-center">
                  <p>
                    Vous n'avez pas de compte ?
                    <a [routerLink]="routes.Register" class="text-primary">
                      Rejoignez-nous dès aujourd'hui</a
                    >
                  </p>
                </div>
              </div>
              <div>
                <img
                  src="assets/img/bg/authentication-bg.png"
                  class="bg-left-top"
                  alt="Image"
                />
                <img
                  src="assets/img/bg/authentication-bg.png"
                  class="bg-right-bottom"
                  alt="Image"
                />
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
