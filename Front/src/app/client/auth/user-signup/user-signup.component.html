<div class="authentication-header">
  <div class="container">
    <div class="col-md-12">
      <div class="text-center">
        <img src="assets/logo/logo.svg" alt="logo" class="h-50 w-25" />
      </div>
    </div>
  </div>
</div>
<div class="main-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 mx-auto">
        <form>
          <div class="d-flex flex-column justify-content-center">
            <div class="card p-sm-4 my-5">
              <div class="card-body">
                <div class="text-center mb-3">
                  <h3 class="mb-2">Inscription Utilisateur</h3>
                </div>
                <div class="mb-3">
                  <label class="form-label">Prénom</label>
                  <input type="text" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Numéro de téléphone</label>
                  <input
                    class="form-control"
                    id="phone"
                    name="phone"
                    type="text"
                  />
                </div>
                <div class="mb-3">
                  <div
                    class="d-flex align-items-center justify-content-between flex-wrap"
                  >
                    <label class="form-label">Mot de passe</label>
                    <p class="text-gray-6 fw-medium mb-1">
                      Doit comporter au moins 8 caractères
                    </p>
                  </div>
                  <input type="password" class="form-control" />
                </div>
                <div class="mb-3">
                  <div
                    class="d-flex align-items-center justify-content-between flex-wrap row-gap-2"
                  >
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        value=""
                        id="remember_me"
                      />
                      <label class="form-check-label" for="remember_me">
                        J'accepte les
                        <a
                          href="javascript:void(0);"
                          class="text-primary text-decoration-underline"
                          >Conditions d'utilisation</a
                        >
                        et la
                        <a
                          href="javascript:void(0);"
                          class="text-primary text-decoration-underline"
                          >Politique de confidentialité</a
                        >
                      </label>
                    </div>
                  </div>
                </div>
                <div class="mb-3">
                  <button
                    type="button"
                    class="btn btn-lg btn-linear-primary w-100"
                    (click)="navigate()"
                  >
                    S'inscrire
                  </button>
                </div>
                <div class="d-flex justify-content-center">
                  <p>
                    Vous avez déjà un compte ?
                    <a [routerLink]="routes.login" class="text-primary"
                      >Se connecter</a
                    >
                  </p>
                </div>
              </div>
              <div>
                <img
                  src="assets/img/bg/authentication-bg.png"
                  class="bg-left-top"
                  alt="Image"
                />
                <img
                  src="assets/img/bg/authentication-bg.png"
                  class="bg-right-bottom"
                  alt="Image"
                />
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
